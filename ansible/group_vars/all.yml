---
# Safety defaults: local, explicit, least-surprise.
profile_env: personal
profile_allow_host_mutation: false
profile_allow_remote_host_mutation: false
profile_install_tools: false
profile_enable_mac_apps: false

profile_repo_dir: "{{ playbook_dir | dirname }}"
profile_app_bin: "{{ profile_repo_dir }}/bin"
profile_home: "{{ ansible_facts.env.HOME }}"

profile_shell_sources:
  - zsh_profile.sh
  - myprofile.sh

profile_dotfile_links:
  - src: "{{ profile_repo_dir }}/bin/tmux/tmux.conf"
    dest: "{{ profile_home }}/.tmux.conf"
  - src: "{{ profile_repo_dir }}/bin/tmux/tmux.conf"
    dest: "{{ profile_home }}/.config/tmux/tmux.conf"
  - src: "{{ profile_repo_dir }}/bin/ghostty/config"
    dest: "{{ profile_home }}/.config/ghostty/config"
  - src: "{{ profile_repo_dir }}/bin/nvim/init.lua"
    dest: "{{ profile_home }}/.config/nvim/init.lua"
  - src: "{{ profile_repo_dir }}/bin/nvim/lua"
    dest: "{{ profile_home }}/.config/nvim/lua"
  - src: "{{ profile_repo_dir }}/bin/nvim/after"
    dest: "{{ profile_home }}/.config/nvim/after"

# Empty by default. Opt in per run/env to keep blast radius small.
profile_tools: []
profile_core_tools:
  - git
  - tmux
  - nvim

profile_mac_brew_packages: []
profile_mac_brew_casks: []

# SSH authorized_keys management.
# Enable per inventory/env and point at a 1Password secret reference containing
# newline-separated public keys, e.g. op://<vault>/<item>/public_keys.
profile_ssh_authorized_keys_enabled: false
profile_op_cli: op
profile_op_account: ""
profile_ssh_authorized_keys_op_ref: ""
profile_ssh_authorized_keys: []
profile_ssh_authorized_keys_user: "{{ ansible_facts.user_id }}"
profile_ssh_authorized_keys_exclusive: false

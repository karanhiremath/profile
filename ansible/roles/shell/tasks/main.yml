---
- name: Ensure zshrc exists
  ansible.builtin.file:
    path: "{{ profile_home }}/.zshrc"
    state: touch
    mode: "0644"

- name: Manage profile shell block
  ansible.builtin.blockinfile:
    path: "{{ profile_home }}/.zshrc"
    create: true
    mode: "0644"
    marker: "# {mark} profile ansible managed shell"
    block: |
      export PATH="${HOME}/.local/bin:${PATH}"
      {% for profile_file in profile_shell_sources %}
      source {{ profile_repo_dir }}/{{ profile_file }}
      {% endfor %}

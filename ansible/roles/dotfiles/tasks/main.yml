---
- name: Ensure dotfile parent directories exist
  ansible.builtin.file:
    path: "{{ item.dest | dirname }}"
    state: directory
  loop: "{{ profile_dotfile_links }}"

- name: Link managed dotfiles
  ansible.builtin.file:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    state: link
    force: true
  loop: "{{ profile_dotfile_links }}"

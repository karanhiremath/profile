# Host registry for tmux-connect
# Format: name|ssh_target|default_session|description
# ssh_target of "local" means no SSH (local machine)
# Lines starting with # are comments, blank lines are ignored
#
# Shortcut commands (defined in myprofile.sh):
#   tc [tg]         → training cluster (default: crusoe, tg: together)
#   ic [tg|us|eu|uk|ap|au]  → inference cluster by region
#   These are thin wrappers around `tc <host> [session]`

# Local
local|local|mac|Local Mac (work)
mini|home-mac-mini|mac|Home Mac Mini

# ── Training Clusters ──────────────────────────────────────────
# tc        → crusoe (default)
# tc tg     → together AI training

# Crusoe training cluster
cxis-login|cxis-login-0|dev|Crusoe login (jump host)
cxis-dev|cxis-dev-0|dev|Crusoe dev node
cxis-devlarge|cxis-devlarge-0|home|Crusoe devlarge (Docker, builds)
cxis-head|cxis-head-0|dev|Crusoe SLURM head
cx-0|cx-0|gpu|Crusoe H100 compute 0
cx-1|cx-1|gpu|Crusoe H100 compute 1

# Together AI training cluster
tg-train|training|dev|Together AI training bastion
tgk2-c1|tgk2-c1|dev|TGK2 controller 1
tgk2-c2|tgk2-c2|dev|TGK2 controller 2
tgk2-c3|tgk2-c3|dev|TGK2 controller 3
tgk2-c4|tgk2-c4|dev|TGK2 controller 4
tgk2-1|tgk2-1|gpu|TGK2 GPU node 1
tgk2-2|tgk2-2|gpu|TGK2 GPU node 2
tgk2-3|tgk2-3|gpu|TGK2 GPU node 3
tgk2-4|tgk2-4|gpu|TGK2 GPU node 4
tgk2-5|tgk2-5|gpu|TGK2 GPU node 5
tgk2-6|tgk2-6|gpu|TGK2 GPU node 6
tgk2-data|tgk2-data|dev|TGK2 data node

# ── Inference Clusters ─────────────────────────────────────────
# ic        → together US prod (default)
# ic us     → AWS us-west EKS
# ic eu     → AWS EU EKS
# ic uk     → AWS UK EKS
# ic ap     → AWS AP (Mumbai) EKS
# ic au     → AWS AU EKS
# Requires: tailscale (BROKEN on mac as of 2026-03-31)
#           or kubeconfig (cartesia6.kubeconfig)

# Together AI inference (direct SSH — works without tailscale)
ic-tg-prod|tgk2-c1|ops|TG inference prod US (hn1)
ic-tg-staging|tgk2-c4|ops|TG inference staging US (hn4)


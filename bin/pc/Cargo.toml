[package]
name = "pc"
version = "0.1.0"
edition = "2024"
description = "pi-code: tmux + nvim + pi session manager"
authors = ["Karan Hiremath"]

[[bin]]
name = "pc"
path = "src/main.rs"

[dependencies]
anyhow = "1"
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4", features = ["derive"] }
colored = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"

[profile.release]
strip = true
lto = true
opt-level = "z"
